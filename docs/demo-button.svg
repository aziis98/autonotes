<svg xmlns="http://www.w3.org/2000/svg" width="320" height="60" viewBox="0 0 320 60">
  <defs>
    <style>
      .btn-text {
        font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
        font-weight: bold;
        font-size: 15px;
        fill: #000000;
        text-anchor: middle;
        dominant-baseline: middle;
        letter-spacing: 0.5px;
      }
    </style>
  </defs>
  <!-- Shadow -->
  <rect x="10" y="10" width="300" height="44" fill="#0004" rx="4" />
  <!-- Button Body -->
  <rect x="6" y="6" width="300" height="44" fill="#ffde43" stroke="#1a1a1a" stroke-width="2" rx="4" />
  <!-- Text -->
  <text x="156" y="29" class="btn-text">🚀 VIEW LIVE INTERACTIVE DEMO 🚀</text>
</svg>
